packages:
  - '.'
  - packages/*
  - apps/*
  - scratch/*

# pnpm 11 requires an explicit build-script decision per dependency, where
# pnpm 10 silently ignored them. All of these were already unbuilt under
# pnpm 10 and CI/builds passed, so keep them off to preserve that behavior:
#   - esbuild / sharp: ship prebuilt platform binaries via optional deps; no
#     postinstall build is needed.
#   - workerd: its binary is fetched on demand by wrangler/miniflare.
#   - msw: the postinstall is a no-op (worker is set up via `msw init`).
#   - simple-git-hooks: hooks are installed by the root `prepare` script.
allowBuilds:
  esbuild: false
  msw: false
  sharp: false
  simple-git-hooks: false
  workerd: false

# pnpm 10/11 read dependency overrides + patches from here (NOT the package.json
# `pnpm` field, which they ignore). Migrated from package.json so the
# lockfile's overrides match the running config under pnpm@11.x.
overrides:
  x-to-zod: ^0.8.0
  '@zod-to-form/core': ^0.9.1
  '@zod-to-form/react': ^0.9.1
  '@zod-to-form/vite': ^0.4.1
  codemirror: 6.0.2
  '@radix-ui/react-compose-refs': 1.1.2
  '@radix-ui/react-primitive': 2.1.4
  '@radix-ui/react-slot': 1.2.4
  ws: '>=8.21.0'
  # GHSA-w5hq-g745-h8pq: force transitive uuid off the deprecated/vulnerable
  # 8.3.2 (uuid is purely transitive here — no first-party imports).
  uuid: '>=11.1.1'
  # GHSA-ph9p-34f9-6g65 / CVE-2026-44705: path traversal via unsanitized prefix/postfix
  # in tmp < 0.2.6; purely transitive (no first-party imports).
  tmp: '>=0.2.6'

patchedDependencies:
  '@radix-ui/react-slot@1.2.4': patches/@radix-ui__react-slot@1.2.4.patch
  '@radix-ui/react-compose-refs@1.1.2': patches/@radix-ui__react-compose-refs@1.1.2.patch
