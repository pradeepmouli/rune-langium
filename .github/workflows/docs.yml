name: Verify Cloudflare Pages Build

on:
  push:
    branches: [master]
    paths:
      - 'site/**'
      - 'apps/docs/**'
      - 'apps/studio/**'
      - 'packages/**/src/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'site/**'
      - 'apps/docs/**'
      - 'apps/studio/**'
      - 'packages/**/src/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CF_PAGES: '1'
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.32.0
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Build workspace packages
        run: pnpm run build
      - name: Build combined Cloudflare Pages artifact
        run: pnpm --filter @rune-langium/docs run build:combined
