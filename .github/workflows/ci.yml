name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.5.0

      - name: Use Node.js 22.x
        # Pinned to Node 22 to match Cloudflare Workers/Pages `nodejs_compat`
        # production target — every wrangler.toml in the repo enables
        # `nodejs_compat`, which selects Node 22 LTS API surface regardless of
        # the specific compatibility_date used.
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine CDM fixture cache key
        id: fixture-versions
        run: |
          CDM_TAG=$(grep -m1 '^CDM_TAG=' scripts/update-fixtures.sh | cut -d'"' -f2)
          RUNE_TAG=$(grep -m1 '^RUNE_TAG=' scripts/update-fixtures.sh | cut -d'"' -f2)
          FPML_TAG=$(grep -m1 '^FPML_TAG=' scripts/update-fixtures.sh | cut -d'"' -f2)
          echo "cdm-tag=$CDM_TAG" >> "$GITHUB_OUTPUT"
          echo "rune-tag=$RUNE_TAG" >> "$GITHUB_OUTPUT"
          echo "fpml-tag=$FPML_TAG" >> "$GITHUB_OUTPUT"
          echo "cache-key=fixtures-cdm-${CDM_TAG}-rune-${RUNE_TAG}-fpml-${FPML_TAG}" >> "$GITHUB_OUTPUT"

      - name: Cache CDM / Rune DSL / Rune FpML fixtures
        id: fixture-cache
        uses: actions/cache@v5
        with:
          path: .resources
          key: ${{ steps.fixture-versions.outputs.cache-key }}

      - name: Download CDM / Rune DSL / Rune FpML fixtures
        if: steps.fixture-cache.outputs.cache-hit != 'true'
        run: bash scripts/update-fixtures.sh

      - name: Generate Langium artifacts
        run: pnpm run generate
        continue-on-error: true

      - name: Build
        run: pnpm run build:ci
        timeout-minutes: 15

      - name: Type check
        run: pnpm run type-check

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check
        continue-on-error: true

      - name: Test
        run: pnpm run test

      - name: Test Coverage
        run: pnpm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

      - name: Security Audit
        run: pnpm audit --audit-level moderate
        continue-on-error: true

      - name: Check Studio Bundle Size (019 Phase 2)
        run: pnpm --filter @rune-langium/studio run bundle-size
        # Soft-disabled 2026-05-14: ExcelJS + JSZip (PRs #167-#169) pushed
        # the bundle over the configured limit; the check still runs and
        # reports the size in CI logs, but the job no longer fails on it.
        # Re-enable by removing this `continue-on-error` line once the
        # bundle is back under the threshold (lazy-load ExcelJS, etc.).
        continue-on-error: true
        env:
          STUDIO_MAX_BUNDLE_BYTES: ${{ vars.STUDIO_MAX_BUNDLE_BYTES }}

  # ---------------------------------------------------------------------------
  # studio-a11y: axe-core gate against the studio's main routes (T088 / T115).
  #
  # Runs Playwright headlessly on a single Node version, executes the e2e
  # suite at apps/studio/test/e2e/a11y.spec.ts, and fails the job on any
  # 'serious' or 'critical' violation in code we own. Monaco / ReactFlow
  # / dockview surfaces are excluded inside the spec — their a11y posture
  # is upstream's responsibility per FR-A04.
  #
  # Why a separate job: keeps the unit-test job fast on the matrix (no
  # browser install per Node version) and makes a11y regressions easy to
  # find in the checks list.
  # ---------------------------------------------------------------------------
  studio-a11y:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.5.0

      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers (chromium only)
        run: pnpm --filter @rune-langium/studio exec playwright install --with-deps chromium

      - name: Build studio + workspace dependencies
        # `...` suffix builds the studio's workspace deps first (design-tokens
        # emits dist/tokens.css, core emits the AST types). Without it, the
        # studio build can't resolve @rune-langium/design-tokens/tokens.css
        # or @rune-langium/core from the parser worker.
        run: pnpm --filter '@rune-langium/studio...' run build

      - name: Run axe-core a11y gate
        # Invoke playwright directly via `exec` so the --grep flag isn't
        # routed through the pnpm-script `--` boundary (which made
        # playwright interpret "--grep" as a test-file path).
        run: pnpm --filter @rune-langium/studio exec playwright test --grep "Studio a11y"

      - name: Studio memory regression check (019 Phase 2)
        # Skipped at runtime when STUDIO_MEMORY_BASELINE_BYTES is unset
        # (e.g. before the first capture). Once set in repo vars, the
        # gate fires and compares CDM-corpus heap usage against
        # baseline + 5% headroom.
        run: pnpm --filter @rune-langium/studio exec playwright test --grep "Studio browser memory regression"
        env:
          STUDIO_MEMORY_BASELINE_BYTES: ${{ vars.STUDIO_MEMORY_BASELINE_BYTES }}

  # ---------------------------------------------------------------------------
  # check-generated: Verify generated schema files don't drift from source (T039, FR-018, SC-008)
  #
  # Runs generate:schemas, normalises formatting, then fails if any committed
  # generated file differs from the freshly-regenerated output.
  #
  # Note: form scaffolding is no longer a separate step (012-studio-workspace-ux,
  # T104–T108). Forms are emitted at Vite build time via `?z2f` virtual modules
  # served by `@zod-to-form/vite`; nothing checked-in needs regenerating in CI.
  # ---------------------------------------------------------------------------
  check-generated:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.5.0

      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate Zod schemas from Langium grammar
        run: pnpm --filter @rune-langium/visual-editor generate:schemas

      - name: Normalise formatting on generated schemas
        run: |
          pnpm --filter @rune-langium/visual-editor exec oxfmt \
            src/generated/zod-schemas.ts \
            src/generated/zod-schemas.conformance.ts

      - name: Assert no drift between committed and freshly-generated schemas
        run: git diff --exit-code -- packages/visual-editor/src/generated/
