name: CI

on:
  push:
    branches-ignore: ['sub**']

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x, 24.x]

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.32.0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine CDM fixture cache key
        id: fixture-versions
        run: |
          CDM_TAG=$(grep -m1 '^CDM_TAG=' scripts/update-fixtures.sh | cut -d'"' -f2)
          RUNE_TAG=$(grep -m1 '^RUNE_TAG=' scripts/update-fixtures.sh | cut -d'"' -f2)
          FPML_TAG=$(grep -m1 '^FPML_TAG=' scripts/update-fixtures.sh | cut -d'"' -f2)
          echo "cdm-tag=$CDM_TAG" >> "$GITHUB_OUTPUT"
          echo "rune-tag=$RUNE_TAG" >> "$GITHUB_OUTPUT"
          echo "fpml-tag=$FPML_TAG" >> "$GITHUB_OUTPUT"
          echo "cache-key=fixtures-cdm-${CDM_TAG}-rune-${RUNE_TAG}-fpml-${FPML_TAG}" >> "$GITHUB_OUTPUT"

      - name: Cache CDM / Rune DSL / Rune FpML fixtures
        id: fixture-cache
        uses: actions/cache@v5
        with:
          path: .resources
          key: ${{ steps.fixture-versions.outputs.cache-key }}

      - name: Download CDM / Rune DSL / Rune FpML fixtures
        if: steps.fixture-cache.outputs.cache-hit != 'true'
        run: bash scripts/update-fixtures.sh

      - name: Generate Langium artifacts
        run: pnpm run generate
        continue-on-error: true

      - name: Build
        run: pnpm run build

      - name: Type check
        run: pnpm run type-check

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check
        continue-on-error: true

      - name: Test
        run: pnpm run test

      - name: Test Coverage
        run: pnpm run test:coverage
        if: matrix.node-version == '22.x'

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        if: matrix.node-version == '22.x'
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

      - name: Security Audit
        run: pnpm audit --audit-level moderate
        continue-on-error: true

      - name: Check Bundle Size
        run: pnpm dlx size-limit
        if: matrix.node-version == '22.x'
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # studio-a11y: axe-core gate against the studio's main routes (T088 / T115).
  #
  # Runs Playwright headlessly on a single Node version, executes the e2e
  # suite at apps/studio/test/e2e/a11y.spec.ts, and fails the job on any
  # 'serious' or 'critical' violation in code we own. Monaco / ReactFlow
  # / dockview surfaces are excluded inside the spec — their a11y posture
  # is upstream's responsibility per FR-A04.
  #
  # Why a separate job: keeps the unit-test job fast on the matrix (no
  # browser install per Node version) and makes a11y regressions easy to
  # find in the checks list.
  # ---------------------------------------------------------------------------
  studio-a11y:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.32.0

      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers (chromium only)
        run: pnpm --filter @rune-langium/studio exec playwright install --with-deps chromium

      - name: Build studio
        run: pnpm --filter @rune-langium/studio run build

      - name: Run axe-core a11y gate
        run: pnpm --filter @rune-langium/studio run test:e2e -- --grep "Studio a11y"

  # ---------------------------------------------------------------------------
  # check-generated: Verify generated schema files don't drift from source (T039, FR-018, SC-008)
  #
  # Runs generate:schemas, normalises formatting, then fails if any committed
  # generated file differs from the freshly-regenerated output.
  #
  # Note: form scaffolding is no longer a separate step (012-studio-workspace-ux,
  # T104–T108). Forms are emitted at Vite build time via `?z2f` virtual modules
  # served by `@zod-to-form/vite`; nothing checked-in needs regenerating in CI.
  # ---------------------------------------------------------------------------
  check-generated:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.32.0

      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate Zod schemas from Langium grammar
        run: pnpm --filter @rune-langium/visual-editor generate:schemas

      - name: Normalise formatting on generated schemas
        run: |
          pnpm --filter @rune-langium/visual-editor exec oxfmt \
            src/generated/zod-schemas.ts \
            src/generated/zod-schemas.conformance.ts

      - name: Assert no drift between committed and freshly-generated schemas
        run: git diff --exit-code -- packages/visual-editor/src/generated/
